name: songbook
description: "NELC Songbook Collection - A digital hymnal collection for NELC songbooks"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # UI & Styling
  flutter_html: ^3.0.0-beta.2
  google_fonts: ^6.1.0
  material_symbols_icons: ^4.2892.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - data/data.sqlite
    - data/datav2.sqlite
